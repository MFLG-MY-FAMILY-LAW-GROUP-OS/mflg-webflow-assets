name: MFLG Site v2.2 Reveal Pathways Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-site-enhancements:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply reveal-more-pathways patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('js/mflg-site-enhancements.js')
          s = p.read_text(encoding='utf-8')

          s = s.replace('/* MFLG Site Enhancements v2.1', '/* MFLG Site Enhancements v2.2')
          s = s.replace('View All Family Law Pathways scrolls to full pathway section', 'View More Family Law Pathways reveals the full pathway section on click')
          s = s.replace('text.indexOf("view all family law pathways") !== -1 ||', 'text.indexOf("view all family law pathways") !== -1 ||\n      text.indexOf("view more family law pathways") !== -1 ||')

          old_nav = '''      } else if (isPracticeLink(link)) {
        link.setAttribute("href", "#practice-areas");
        routeLinkToElement(link, practice);
      } else if (isFeesLink(link)) {'''
          new_nav = '''      } else if (isPracticeLink(link)) {
        link.setAttribute("href", "#practice-areas");
        routeLinkToElement(link, practice, function () {
          hideFullPathwaysSection();
        });
      } else if (isFeesLink(link)) {'''
          if old_nav in s:
            s = s.replace(old_nav, new_nav, 1)

          old_hero = '''      if (text.indexOf("view practice") !== -1 || text.indexOf("practice area") !== -1) {
        link.classList.add("mflg-hero-secondary-cta");
        link.setAttribute("href", "#practice-areas");
        routeLinkToElement(link, practice);
      }'''
          new_hero = '''      if (text.indexOf("view practice") !== -1 || text.indexOf("practice area") !== -1) {
        link.classList.add("mflg-hero-secondary-cta");
        link.setAttribute("href", "#practice-areas");
        routeLinkToElement(link, practice, function () {
          hideFullPathwaysSection();
        });
      }'''
          if old_hero in s:
            s = s.replace(old_hero, new_hero, 1)

          old_create = '''    var section = createFullPathwaysSection();
    var fees = getFeesElement();'''
          new_create = '''    var section = createFullPathwaysSection();
    var fees = getFeesElement();

    section.setAttribute("hidden", "hidden");
    section.setAttribute("aria-hidden", "true");
    section.style.display = "none";'''
          if old_create in s and 'section.setAttribute("hidden", "hidden");' not in s:
            s = s.replace(old_create, new_create, 1)

          helper_lines = [
            '  function revealFullPathwaysSection(section, buttonWrap) {',
            '    if (!section) return;',
            '',
            '    section.removeAttribute("hidden");',
            '    section.setAttribute("aria-hidden", "false");',
            '    section.style.display = "";',
            '    section.classList.add("mflg-full-pathways-revealed");',
            '',
            '    if (buttonWrap) {',
            '      buttonWrap.style.display = "none";',
            '      buttonWrap.setAttribute("aria-hidden", "true");',
            '    }',
            '',
            '    window.setTimeout(function () {',
            '      scrollToElement(section);',
            '    }, 40);',
            '  }',
            '',
            '  function hideFullPathwaysSection() {',
            '    var section = findFullPathwaySection();',
            '',
            '    if (section) {',
            '      section.setAttribute("hidden", "hidden");',
            '      section.setAttribute("aria-hidden", "true");',
            '      section.style.display = "none";',
            '      section.classList.remove("mflg-full-pathways-revealed");',
            '    }',
            '',
            '    getAll(".mflg-practice-view-all-wrap, .mflg-view-pathways-wrap").forEach(function (wrap) {',
            '      wrap.style.display = "flex";',
            '      wrap.removeAttribute("aria-hidden");',
            '    });',
            '  }',
            '',
            ''
          ]
          helper = '\n'.join(helper_lines)
          marker = '  function addPracticeViewAllButton(practice, cards) {'
          if 'function revealFullPathwaysSection(' not in s:
            if marker not in s:
              raise SystemExit('Could not find addPracticeViewAllButton marker')
            s = s.replace(marker, helper + marker, 1)

          s = s.replace('button.textContent = "View All Family Law Pathways";', 'button.textContent = "View More Family Law Pathways";')
          s = s.replace('button.setAttribute("aria-label", "View all family law pathways");', 'button.setAttribute("aria-label", "View more family law pathways");')

          old_button_route = '''    routeLinkToElement(button, pathwaySection);'''
          new_button_route = '''    button.addEventListener("click", function (event) {
      event.preventDefault();
      revealFullPathwaysSection(pathwaySection, wrap);
    });'''
          if old_button_route in s and 'revealFullPathwaysSection(pathwaySection, wrap);' not in s:
            s = s.replace(old_button_route, new_button_route, 1)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit patch if changed
        run: |
          if git diff --quiet -- js/mflg-site-enhancements.js; then
            echo "No site-enhancements changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/mflg-site-enhancements.js
          git commit -m "Update site enhancements to v2.2 reveal pathways"
          git push
